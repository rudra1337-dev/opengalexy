<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="OpenGalexy is a modern realtime messaging platform for private chats, groups, nearby sharing, and calls."
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
            rel="stylesheet"
        />
        <title>OpenGalexy</title>
        <script>
            ;(function () {
                try {
                    var savedTheme = localStorage.getItem('theme')
                    var isDark = savedTheme
                        ? savedTheme === 'dark'
                        : window.matchMedia('(prefers-color-scheme: dark)')
                              .matches

                    document.documentElement.setAttribute(
                        'data-theme',
                        isDark ? 'dark' : 'light'
                    )
                    document.documentElement.style.colorScheme = isDark
                        ? 'dark'
                        : 'light'
                    document.documentElement.classList.add('theme-ready')
                } catch (error) {
                    document.documentElement.setAttribute('data-theme', 'light')
                    document.documentElement.classList.add('theme-ready')
                }
            })()
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
